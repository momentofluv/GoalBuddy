<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Goal-Buddy | 비밀번호 재설정</title>
    <link rel="stylesheet" href="/css/reset-password.css">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="reset-container">
    <div class="reset-box">
        <h2>비밀번호 재설정</h2>
        <p class="subtitle">새로운 비밀번호를 입력해주세요.</p>

        <form id="resetForm">
            <input type="hidden" id="token" th:value="${token}">

            <div class="input-group">
                <label for="newPassword">새 비밀번호</label>
                <input type="password" id="newPassword" placeholder="8자 이상, 영어 대/소문자, 숫자, 특수문자 중 2개 이상" minlength="8" required>
            </div>

            <div class="input-group">
                <label for="confirmPassword">비밀번호 확인</label>
                <input type="password" id="confirmPassword" placeholder="동일한 패스워드 다시 입력" minlength="8" required>
                <span id="matchMessage" class="message"></span>
            </div>

            <button type="submit" id="submitBtn">비밀번호 변경</button>
        </form>
    </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<script th:src="@{/js/reset-password.js}"></script>
</body>
</html>
